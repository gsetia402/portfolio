<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00F5D4"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="32" height="32" rx="8" fill="#050816"/>
  <!-- Phone body -->
  <rect x="10" y="4" width="12" height="24" rx="2.5" fill="none" stroke="url(#grad)" stroke-width="1.8"/>
  <!-- Screen -->
  <rect x="12" y="7" width="8" height="16" rx="1" fill="url(#grad)" opacity="0.15"/>
  <!-- Code lines on screen -->
  <line x1="13" y1="10" x2="17" y2="10" stroke="#00F5D4" stroke-width="1" stroke-linecap="round"/>
  <line x1="13" y1="12.5" x2="19" y2="12.5" stroke="#7C3AED" stroke-width="1" stroke-linecap="round"/>
  <line x1="13" y1="15" x2="16" y2="15" stroke="#00F5D4" stroke-width="1" stroke-linecap="round"/>
  <line x1="13" y1="17.5" x2="18" y2="17.5" stroke="#7C3AED" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <!-- Signal/IoT dots -->
  <circle cx="22" cy="7" r="1" fill="#00F5D4" opacity="0.8"/>
  <circle cx="25" cy="5" r="0.7" fill="#00F5D4" opacity="0.5"/>
  <circle cx="24" cy="9" r="0.5" fill="#7C3AED" opacity="0.6"/>
  <!-- Home button -->
  <circle cx="16" cy="26" r="1.2" fill="none" stroke="url(#grad)" stroke-width="0.8"/>
</svg>
